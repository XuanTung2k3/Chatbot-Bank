<svg xmlns="http://www.w3.org/2000/svg" width="380" height="550" viewBox="0 0 380 550" role="img" aria-labelledby="title desc">
  <title id="title">Empathetic chatbot UI mockup</title>
  <desc id="desc">Illustrative screenshot-style mockup of the empathetic AmazingBank chatbot answering a card service question.</desc>
  <defs>
    <style>
      .bg { fill: #ecf5fb; }
      .panel { fill: #ffffff; stroke: #d7e4f0; stroke-width: 2; }
      .header { fill: #1a5276; }
      .headerText { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .meta { font: 600 11px Arial, sans-serif; fill: #4f6378; }
      .bubbleLeft { fill: #f6fbff; stroke: #c8ddf0; stroke-width: 1.5; }
      .bubbleRight { fill: #1a5276; }
      .leftText { font: 400 13px Arial, sans-serif; fill: #21384b; }
      .rightText { font: 400 13px Arial, sans-serif; fill: #ffffff; }
      .avatarBot { fill: #2e86c1; }
      .avatarUser { fill: #d35400; }
      .avatarText { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="380" height="550" rx="22"/>
  <rect class="panel" x="28" y="22" width="324" height="506" rx="20"/>
  <rect class="header" x="28" y="22" width="324" height="68" rx="20"/>
  <text class="headerText" x="54" y="63">AmazingBank Support</text>

  <circle class="avatarUser" cx="314" cy="150" r="20"/>
  <text class="avatarText" x="309" y="155">Y</text>
  <rect class="bubbleRight" x="134" y="118" width="160" height="64" rx="16"/>
  <text class="rightText" x="148" y="143">Tell me about</text>
  <text class="rightText" x="148" y="162">card service</text>

  <circle class="avatarBot" cx="66" cy="243" r="20"/>
  <text class="avatarText" x="61" y="248">A</text>
  <rect class="bubbleLeft" x="96" y="206" width="214" height="138" rx="16"/>
  <text class="meta" x="112" y="228">Empathetic mode</text>
  <text class="leftText" x="112" y="255">I can help with that. AmazingBank</text>
  <text class="leftText" x="112" y="274">card services usually include debit</text>
  <text class="leftText" x="112" y="293">cards for account spending and credit</text>
  <text class="leftText" x="112" y="312">cards for borrowing within an approved</text>
  <text class="leftText" x="112" y="331">limit. If you want, I can also help</text>
  <text class="leftText" x="112" y="350">you compare which one fits best. 😊</text>

  <rect x="48" y="476" width="284" height="22" rx="11" fill="#eef4f8"/>
  <text class="meta" x="66" y="491">Illustrative mockup used in the tutorial repo</text>
</svg>
