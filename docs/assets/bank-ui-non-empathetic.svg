<svg xmlns="http://www.w3.org/2000/svg" width="380" height="550" viewBox="0 0 380 550" role="img" aria-labelledby="title desc">
  <title id="title">Non-empathetic chatbot UI mockup</title>
  <desc id="desc">Illustrative screenshot-style mockup of the non-empathetic AmazingBank chatbot answering a card service question.</desc>
  <defs>
    <style>
      .bg { fill: #edf1f4; }
      .panel { fill: #f8fafb; stroke: #d3dbe2; stroke-width: 2; }
      .header { fill: #34495e; }
      .headerText { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .meta { font: 600 11px Arial, sans-serif; fill: #516474; }
      .bubbleLeft { fill: #ffffff; stroke: #ccd4dc; stroke-width: 1.5; }
      .bubbleRight { fill: #5d6d7e; }
      .leftText { font: 400 13px Arial, sans-serif; fill: #263746; }
      .rightText { font: 400 13px Arial, sans-serif; fill: #ffffff; }
      .avatarBot { fill: #566573; }
      .avatarUser { fill: #7f8c8d; }
      .avatarText { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="380" height="550" rx="22"/>
  <rect class="panel" x="28" y="22" width="324" height="506" rx="20"/>
  <rect class="header" x="28" y="22" width="324" height="68" rx="20"/>
  <text class="headerText" x="54" y="63">AmazingBank Support</text>

  <circle class="avatarUser" cx="314" cy="150" r="20"/>
  <text class="avatarText" x="309" y="155">Y</text>
  <rect class="bubbleRight" x="134" y="118" width="160" height="64" rx="16"/>
  <text class="rightText" x="148" y="143">Tell me about</text>
  <text class="rightText" x="148" y="162">card service</text>

  <circle class="avatarBot" cx="66" cy="243" r="20"/>
  <text class="avatarText" x="61" y="248">A</text>
  <rect class="bubbleLeft" x="96" y="206" width="214" height="126" rx="16"/>
  <text class="meta" x="112" y="228">Non-empathetic mode</text>
  <text class="leftText" x="112" y="255">AmazingBank card services typically</text>
  <text class="leftText" x="112" y="274">include debit cards for direct account</text>
  <text class="leftText" x="112" y="293">spending and credit cards for borrowing</text>
  <text class="leftText" x="112" y="312">within an approved limit. Compare fees,</text>
  <text class="leftText" x="112" y="331">eligibility, repayment terms, and usage.</text>

  <rect x="48" y="476" width="284" height="22" rx="11" fill="#e7ecef"/>
  <text class="meta" x="66" y="491">Illustrative mockup used in the tutorial repo</text>
</svg>
